packaging_format = 2

id = "misp"
name = "MISP"
description.en = "Malware Information Sharing Platform, on Docker Compose"
version = "0.1.1~ynh1"
maintainers = ["you"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://www.misp-project.org/"
admindoc = "https://www.misp-project.org/documentation/"

[requirements]
yunohost = ">= 11.2.0"

[install]
  [install.questions]
  domain.type = "domain"
  domain.default = null

  subpath.type = "path"
  subpath.default = "/"
  subpath.ask.en = "URL path (use '/' unless you know you need a subpath)"

  is_public.type = "boolean"
  is_public.default = false
  is_public.ask.en = "Should the portal access be public on SSO? (MISP still has its own login)"

  admin_email.type = "string"
  admin_email.ask.en = "Email for Let's Encrypt and app notices"

  misp_version.type = "string"
  misp_version.default = "v2.4.185"
  misp_version.ask.en = "MISP web image tag (e.g. 'v2.4.185')"

  modules_version.type = "string"
  modules_version.default = "v2.4.185"
  modules_version.ask.en = "misp-modules image tag (e.g. 'v2.4.185')"

  db_root_password.type = "password"
  db_root_password.generate = true

  db_password.type = "password"
  db_password.generate = true

  redis_password.type = "password"
  redis_password.generate = true
  redis_password.ask.en = "Password for Redis (auto-generated if left blank)"

  enable_db_settings.type = "boolean"
  enable_db_settings.default = false
  enable_db_settings.ask.en = "Store MISP system settings in the DB (advanced)?"

  upload_limit_mb.type = "number"
  upload_limit_mb.default = 200

[resources]
  [resources.sources]
  # No source tarballs; we pull container images at install/upgrade.

  [resources.system_user]
  name = "misp"

  [resources.install_dir]
  path = "/var/www/misp"

  [resources.data_dir]
  path = "/home/yunohost.app/misp"

  [resources.permissions]
  main.url = "/"
  main.allowed = "visitors"

  [resources.apt]
  packages = ["docker.io", "docker-compose-plugin"]
