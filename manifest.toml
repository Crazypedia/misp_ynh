packaging_format = 2

id = "misp"
name = "MISP"
description.en = "Malware Information Sharing Platform, on Docker Compose"
version = "2.4.185~ynh1"
maintainers = ["Crazypedia"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://www.misp-project.org/"
admindoc = "https://www.misp-project.org/documentation/"

[requirements]
yunohost = ">= 11.2.0"

[install]
  [install.domain]
  type = "domain"

  [install.subpath]
  type = "path"
  default = "/"
  ask.en = "URL path (use '/' unless you know you need a subpath)"

  [install.is_public]
  type = "boolean"
  default = false
  ask.en = "Should the portal access be public on SSO?"

  [install.admin_email]
  type = "string"
  ask.en = "Admin email (used for MISP default admin)"

  [install.admin_password]
  type = "password"
  ask.en = "Initial MISP admin password (default: admin)"
  default = "admin"

  [install.admin_org]
  type = "string"
  ask.en = "Initial MISP organization name (default: ORGNAME)"
  default = "ORGNAME"

  [install.misp_version]
  type = "string"
  default = "v2.4.185"
  ask.en = "MISP web image tag (e.g. 'v2.4.185')"

  [install.modules_version]
  type = "string"
  default = "v2.4.185"
  ask.en = "misp-modules image tag (e.g. 'v2.4.185')"

  [install.db_root_password]
  type = "password"
  generate = true

  [install.db_password]
  type = "password"
  generate = true

  [install.redis_password]
  type = "password"
  generate = true
  ask.en = "Password for Redis (auto-generated if left blank)"

  [install.enable_db_settings]
  type = "boolean"
  default = false
  ask.en = "Store MISP system settings in the DB (advanced)?"

  [install.upload_limit_mb]
  type = "number"
  default = 200

[resources]
  [resources.sources]
  # No source tarballs; we pull container images at install/upgrade.

  [resources.system_user]
  name = "misp"

  [resources.install_dir]
  path = "/var/www/misp"

  [resources.data_dir]
  path = "/home/yunohost.app/misp"

  [resources.permissions]
  main.url = "/"
  main.allowed = "all_users"

  [resources.apt]
  packages = ["docker.io", "docker-compose-plugin"]
